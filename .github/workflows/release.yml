name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon and Intel
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # for Debian and AppImage
            args: ""
          - platform: "windows-latest" # for MSI and EXE
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skipping on windows and ubuntu
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        id: tauri_action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "校园灵宠 v__VERSION__"
          releaseBody: "校园灵宠桌面版自动构建版本。"
          # 用正确的参数名 assetNamePattern，硬编码 classcritter 前缀避免中文被剥离
          assetNamePattern: "classcritter-[version]-[platform]-[arch][ext]"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload to Aliyun OSS
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: "oss-cn-beijing.aliyuncs.com"
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      
      - name: Sync Artifacts to OSS
        run: |
          # 使用阿里云官方的 ossutil 工具进行批量上传
          # 这里上传生成的安装包和对应的签名文件
          ossutil cp -r src-tauri/target/release/bundle/ oss://liccimages/updater/ --include "*.zip" --include "*.tar.gz" --include "*.msi" --include "*.dmg" --include "*.sig" --update -f
          
          # tauri-action 在打包完成后会生成 latest.json，我们把它也同步上去
          find . -name "latest.json" -exec ossutil cp {} oss://liccimages/updater/latest.json -f \;
