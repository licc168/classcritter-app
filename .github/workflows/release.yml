name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon and Intel
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # for Debian and AppImage
            args: ""
          - platform: "windows-latest" # for MSI and EXE
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skipping on windows and ubuntu
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-${{ github.ref_name }}
          releaseName: "校园灵宠 ${{ github.ref_name }}"
          releaseBody: "校园灵宠桌面版自动构建版本。"
          # 用正确的参数名 assetNamePattern，硬编码 classcritter 前缀避免中文被剥离
          assetNamePattern: "classcritter-[version]-[platform]-[arch][ext]"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  sync-oss:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_assets
          cd release_assets
          # 等待一下确保 release 已经完全 ready
          sleep 10
          # 下载该 tag 对应的所有 Release 附件
          gh release download app-${{ github.ref_name }} --repo ${{ github.repository }}
          
          # 替换 latest.json 中的 github 下载链接为 OSS 的 CDN 链接
          if [ -f "latest.json" ]; then
            sed -i 's|https://github.com/[^/]*/[^/]*/releases/download/[^/]*/|https://image.albumshare.cn/updater/|g' latest.json
          fi

      - name: Upload to Aliyun OSS
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: "oss-cn-beijing.aliyuncs.com"
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Sync to OSS
        run: |
          cd release_assets
          # 将所有的附件和修改后的 latest.json 上传到 OSS
          ossutil cp -r . oss://liccimages/updater/ --update -f
