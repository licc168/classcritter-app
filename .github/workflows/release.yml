name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon and Intel
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # for Debian and AppImage
            args: ""
          - platform: "windows-latest" # for MSI and EXE
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skipping on windows and ubuntu
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> src-tauri/target"

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-${{ github.ref_name }}
          releaseName: "校园灵宠 ${{ github.ref_name }}"
          releaseBody: "校园灵宠桌面版自动构建版本。"
          # 用正确的参数名 assetNamePattern，硬编码 classcritter 前缀避免中文被剥离
          assetNamePattern: "classcritter-[version]-[platform]-[arch][ext]"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  sync-oss:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_assets
          cd release_assets
          # 等待一下确保 release 已经完全 ready
          sleep 10
          # 下载该 tag 对应的所有 Release 附件
          gh release download app-${{ github.ref_name }} --repo ${{ github.repository }} --pattern "*"
          
          # 无论 GitHub Release 里有没有 latest.json，都强制手动生成一份正确的
          # 因为 tauri-action 生成的 latest.json 里包含中文字符和默认的文件名格式
          # 而我们在上面用 assetNamePattern 重命名了文件，导致两边 URL 对不上报 404
          echo "Generating correct latest.json manually to match renamed assets..."
          VERSION="${{ github.ref_name }}"
          VERSION_NUM=${VERSION#v}
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # 动态查找真实的压缩包文件名（避免 tauri-action 的平台命名与硬编码不一致）
          MAC_ASSET=$(ls *.app.tar.gz 2>/dev/null | head -n 1)
          WIN_ASSET=$(ls *.nsis.zip 2>/dev/null | head -n 1)
          
          # 获取对应的签名内容
          SIG_MAC_UNIV=$(cat "${MAC_ASSET}.sig" 2>/dev/null || echo "")
          SIG_WIN_X64=$(cat "${WIN_ASSET}.sig" 2>/dev/null || echo "")

          VERSION_NUM="$VERSION_NUM" PUB_DATE="$PUB_DATE" SIG_MAC_UNIV="$SIG_MAC_UNIV" SIG_WIN_X64="$SIG_WIN_X64" MAC_ASSET="$MAC_ASSET" WIN_ASSET="$WIN_ASSET" python3 -c '
          import json, os, pathlib
          version = os.environ["VERSION_NUM"]
          pub_date = os.environ["PUB_DATE"]
          sig_mac = os.environ["SIG_MAC_UNIV"]
          sig_win = os.environ["SIG_WIN_X64"]
          mac_asset = os.environ["MAC_ASSET"]
          win_asset = os.environ["WIN_ASSET"]

          payload = {
            "version": version,
            "notes": f"更新了版本 {version}",
            "pub_date": pub_date,
            "platforms": {
              "darwin-aarch64": {"signature": sig_mac, "url": f"https://image.albumshare.cn/updater/{mac_asset}"},
              "darwin-x86_64": {"signature": sig_mac, "url": f"https://image.albumshare.cn/updater/{mac_asset}"},
              "windows-x86_64": {"signature": sig_win, "url": f"https://image.albumshare.cn/updater/{win_asset}"}
            }
          }
          pathlib.Path("latest.json").write_text(json.dumps(payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          '

      - name: Upload to Aliyun OSS
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: "oss-cn-beijing.aliyuncs.com"
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Sync to OSS
        run: |
          cd release_assets
          # 将所有的附件和重新生成的 latest.json 上传到 OSS
          ossutil cp -r . oss://liccimages/updater/ --update -f
          ossutil cp latest.json oss://liccimages/updater/latest.json -f
