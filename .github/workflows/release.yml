name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # for Apple Silicon and Intel
            args: "--target universal-apple-darwin"
          - platform: "ubuntu-22.04" # for Debian and AppImage
            args: ""
          - platform: "windows-latest" # for MSI and EXE
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's skipping on windows and ubuntu
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-${{ github.ref_name }}
          releaseName: "校园灵宠 ${{ github.ref_name }}"
          releaseBody: "校园灵宠桌面版自动构建版本。"
          # 用正确的参数名 assetNamePattern，硬编码 classcritter 前缀避免中文被剥离
          assetNamePattern: "classcritter-[version]-[platform]-[arch][ext]"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  sync-oss:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p release_assets
          cd release_assets
          # 等待一下确保 release 已经完全 ready
          sleep 10
          # 下载该 tag 对应的所有 Release 附件
          gh release download app-${{ github.ref_name }} --repo ${{ github.repository }} --pattern "*"
          
          # 手动生成一个 latest.json 如果 github release 里没有
          # 因为 tauri-action 可能默认没有上传 latest.json 到 release asset 中
          if [ ! -f "latest.json" ]; then
            echo "Generating latest.json manually..."
            VERSION="${{ github.ref_name }}"
            # 去除前缀 v
            VERSION_NUM=${VERSION#v}
            PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            
            # 提取签名内容
            SIG_MAC_UNIV=$(cat classcritter-${VERSION_NUM}-universal-apple-darwin.app.tar.gz.sig 2>/dev/null || echo "")
            SIG_WIN_X64=$(cat classcritter-${VERSION_NUM}-windows-x64.exe.sig 2>/dev/null || echo "")
            
            cat > latest.json << EOF
            {
              "version": "${VERSION_NUM}",
              "notes": "更新了版本 ${VERSION_NUM}",
              "pub_date": "${PUB_DATE}",
              "platforms": {
                "darwin-aarch64": {
                  "signature": "${SIG_MAC_UNIV}",
                  "url": "https://image.albumshare.cn/updater/classcritter-${VERSION_NUM}-darwin-universal.app.tar.gz"
                },
                "darwin-x86_64": {
                  "signature": "${SIG_MAC_UNIV}",
                  "url": "https://image.albumshare.cn/updater/classcritter-${VERSION_NUM}-darwin-universal.app.tar.gz"
                },
                "windows-x86_64": {
                  "signature": "${SIG_WIN_X64}",
                  "url": "https://image.albumshare.cn/updater/classcritter-${VERSION_NUM}-windows-x64.exe"
                }
              }
            }
EOF
          else
            # 替换 latest.json 中的 github 下载链接为 OSS 的 CDN 链接
            sed -i 's|https://github.com/[^/]*/[^/]*/releases/download/[^/]*/|https://image.albumshare.cn/updater/|g' latest.json
          fi

      - name: Upload to Aliyun OSS
        uses: manyuanrong/setup-ossutil@v2.0
        with:
          endpoint: "oss-cn-beijing.aliyuncs.com"
          access-key-id: ${{ secrets.OSS_ACCESS_KEY_ID }}
          access-key-secret: ${{ secrets.OSS_ACCESS_KEY_SECRET }}

      - name: Sync to OSS
        run: |
          cd release_assets
          # 将所有的附件和修改后的 latest.json 上传到 OSS
          # 添加 header 指定 content-type，确保 latest.json 不被识别为 xml
          ossutil cp -r . oss://liccimages/updater/ --update -f
          if [ -f "latest.json" ]; then
            ossutil set-meta oss://liccimages/updater/latest.json Content-Type:application/json -u
          fi
